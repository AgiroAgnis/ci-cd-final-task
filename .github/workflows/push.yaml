name: go-CI/CD-pipeline

on:
# можно и просто on: push
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  
jobs:
  # тестирование
  test:
    runs-on: ubuntu-latest
    container: golang:1.25.3

    steps:
      - name: Checkout code
      - uses: action/checkout@v4

      - name: Run Unit Tests
        run: GOOS=linux GOARCH=amd64 go test
      
      - name: Vet
        run: go vet ./...

  # деплой в докер хаб, если добавлен тег
  deploy:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    # выполняется только, если тесты прошли успешно
    needs: test
    # только если пушим тег
    if: startsWith(github.ref, 'refs/tags')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: agiroagnis/ci-cd-final-task

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}